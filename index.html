<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";

    const nameInput = document.querySelector('.add-form-name');
    const textInput = document.querySelector('.add-form-text');
    const addButton = document.querySelector('.add-form-button');
    const commentsList = document.querySelector('.comments');

    function getCurrentDateTime() {
      const now = new Date();

      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = String(now.getFullYear()).slice(2);
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      return `${day}.${month}.${year} ${hours}:${minutes}`;
    }

    function validateForm() {
      const name = nameInput.value.trim();
      const text = textInput.value.trim();
      
      if (name === '' || text === '') {
        alert('Пожалуйста, заполните и имя, и текст комментария');
        return false;
      }
      
      return true;
    }

    function createComment(name, text) {
      const currentDateTime = getCurrentDateTime();
      
      const commentHTML = `
        <li class="comment">
          <div class="comment-header">
            <div>${name}</div>
            <div>${currentDateTime}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              ${text}
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">0</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
      `;
      
      return commentHTML;
    }

    function addComment() {
      if (!validateForm()) {
        return;
      }
      
      const name = nameInput.value.trim();
      const text = textInput.value.trim();
      
      const newComment = createComment(name, text);
      
      commentsList.innerHTML += newComment;
      
      nameInput.value = '';
      textInput.value = '';
    }

    addButton.addEventListener('click', addComment);

    nameInput.addEventListener('input', function() {
      console.log('Имя изменено');
    });
    
    textInput.addEventListener('input', function() {
      console.log('Текст изменен');
    });

    console.log("It works!");
  </script>
</html>
